name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. Login Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 4. Get commit SHA
      - name: Extract commit SHA
        run: echo "SHA=${GITHUB_SHA}" >> $GITHUB_ENV

      # 5. Build & Push Image
      - name: Build and push Docker image
        run: |
          docker build -t gauravsaini2311/portfolio-app:$SHA .
          docker push gauravsaini2311/portfolio-app:$SHA

      # 6. Update Kubernetes manifest
      - name: Update deployment.yaml image
        run: |
          sed -i "s|IMAGE_TAG|$SHA|g" k8s/deployment.yaml

      # 7. Commit & push updated manifest
      - name: Commit and push changes
        run: |
          git config --global user.name "gaurav"
          git config --global user.email "gaurav@example.com"
          git add k8s/deployment.yaml
          git commit -m "Update image tag to $SHA" || echo "No changes to commit"
          git push origin main
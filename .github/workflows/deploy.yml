name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
      # 2. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. Login Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 4. Get commit SHA
      - name: Extract commit SHA
        run: echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      # 5. Build & Push Image
      - name: Build and push Docker image
        run: |
          docker build -t gauravsaini2311/portfolio-app:${{ env.SHA }} .
          docker push gauravsaini2311/portfolio-app:${{ env.SHA }}

      # 6. Update Kubernetes manifest
      - name: Update deployment.yaml image
        run: |
          sed -i "s|IMAGE_TAG|${{ env.SHA }}|g" k8s/deployment.yaml
          echo "Updated image tag:"
          grep "image:" k8s/deployment.yaml

      # 7. Commit & push updated manifest
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to ${{ env.SHA }}"
          git push origin main

      - name: Restore IMAGE_TAG placeholder for next run
        run: |
          sed -i "s|${{ env.SHA }}|IMAGE_TAG|g" k8s/deployment.yaml
          git add k8s/deployment.yaml
          git commit -m "ci: restore IMAGE_TAG placeholder [skip ci]"
          git push origin main
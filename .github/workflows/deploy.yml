name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3
    
      # 2. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. Login Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 4. Get commit SHA
      - name: Extract commit SHA
        run: echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      # 5. Build & Push Image
      - name: Build and push Docker image
        run: |
          docker build -t gauravsaini2311/portfolio-app:${{ env.SHA }} .
          docker push gauravsaini2311/portfolio-app:${{ env.SHA }}

      - name: Generate deployment.yaml from template
        run: |
          sed "s|IMAGE_TAG|${{ env.SHA }}|g" k8s/deployment.template.yaml > k8s/deployment.yaml
          echo "Generated:"
          grep "image:" k8s/deployment.yaml

      - name: Commit deployment.yaml
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add k8s/deployment.yaml
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "ci: deploy image ${{ env.SHA }}"
          git push origin main